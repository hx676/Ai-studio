<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.05.25.7"></script>
    <script src="/static/js/theme.js?v=2026.05.25.7"></script>
    <script src="/static/js/i18n.js?v=2026.05.25.7"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.05.25.7">
    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.05.25.7');

        /* 本地 Tailwind 工具类兜底：CDN 慢/未就绪时也能立刻给图标尺寸，避免首屏左侧栏空白 */
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #111722;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
        }

        /* 极简滚动条 */
        html,
        body {
            overscroll-behavior: auto;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: width 0.3s var(--fluid-ease), background 0.3s, border-color 0.3s;
            z-index: 50;
        }

        body.sidebar-expanded .sidebar {
            width: 220px;
        }

        /* 首次加载时与 iframe 的 0.5s 淡入同步播放，避免侧栏"焊死"在原地造成视觉断层 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .brand-lockup {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            overflow: hidden;
            padding-left: 8px;
            transition: width 0.3s var(--fluid-ease);
        }

        body.sidebar-expanded .brand-lockup {
            width: 190px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .brand-name {
            opacity: 0;
            color: var(--text);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        body.sidebar-expanded .brand-name {
            opacity: 1;
        }

        .sidebar-toggle {
            width: 44px;
            height: 36px;
            margin: -22px 0 22px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
        }

        .sidebar-toggle:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        body.sidebar-expanded .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            transition: width 0.3s var(--fluid-ease);
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        body.sidebar-expanded .nav-item {
            width: 190px;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        body.sidebar-expanded .nav-text {
            opacity: 1;
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        .side-actions {
            margin-top:auto;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius:999px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 只过渡 hover/激活会改的属性，避免 all 触发延迟 */
            transition: width 0.3s var(--fluid-ease), gap 0.3s var(--fluid-ease), background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:8px;
            position:relative;
        }

        body.sidebar-expanded .side-pill {
            width: 170px;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.2s, max-width 0.3s var(--fluid-ease);
        }
        body.sidebar-expanded .side-pill-text {
            opacity:1;
            max-width:120px;
        }
        /* 折叠态去除 gap，避免图标被推偏 */
        .side-pill { gap:0; }
        body.sidebar-expanded .side-pill { gap:8px; }
    </style>
</head>

<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-lockup mb-12" title="SynCanvas">
                <img class="brand-logo" src="/static/images/logo.png" alt="SynCanvas">
                <span class="brand-name">SynCanvas</span>
            </div>

            <button class="sidebar-toggle" id="sidebar-toggle-btn" type="button" onclick="toggleSidebar()" title="展开/收起侧边栏" aria-label="展开/收起侧边栏" aria-expanded="false">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 6l6 6-6 6"></path>
                </svg>
            </button>

            <nav>
                <div class="nav-item active" onclick="switchUI(this, 'zimage')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.587-1.587a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="nav-text" data-i18n="nav.textToImage">AI 生图</span>
                </div>
                <div class="nav-item" onclick="switchUI(this, 'gpt-chat')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="nav-text" data-i18n="nav.gpt">AI 对话</span>
                </div>
                <div class="nav-item" onclick="switchUI(this, 'canvas')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="nav-text" data-i18n="nav.canvas">无限画布</span>
                </div>
                <div class="nav-item" onclick="switchUI(this, 'digital-human')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="3" width="14" height="18" rx="2"></rect>
                        <circle cx="12" cy="10" r="3"></circle>
                        <path d="M8 18a4 4 0 0 1 8 0"></path>
                    </svg>
                    <span class="nav-text">数字人</span>
                </div>
            </nav>

            <div class="side-actions">
                <button class="side-pill" onclick="toggleTheme()" id="theme-toggle-btn" type="button" title="切换夜间模式">
                    <svg id="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="icon-sun" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span class="side-pill-text" data-i18n="common.darkMode">黑夜模式</span>
                </button>
                <button class="side-pill" onclick="toggleLanguage()" id="lang-toggle-btn" type="button" title="Language">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M2 12h20"></path>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span class="side-pill-text" data-i18n="common.language">中文</span>
                </button>
                <button class="side-pill" onclick="switchUI(this, 'api-settings')" type="button" title="API 设置">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 7h3a5 5 0 0 1 0 10h-3"></path>
                        <path d="M9 17H6A5 5 0 0 1 6 7h3"></path>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                    <span class="side-pill-text" data-i18n="common.apiSettings">API 设置</span>
                </button>
            </div>
        </aside>
        <script>
            /* 在侧栏 DOM 解析完后立即把 active 类移到当前页对应的入口，避免首屏先在文生图上闪一下 */
            (function(){
                try {
                    var pageId = localStorage.getItem('studio_active_page');
                    if(pageId === 'enhance' || pageId === 'klein' || pageId === 'online' || pageId === 'angle' || pageId === 'comfyui-settings') {
                        pageId = 'zimage';
                        localStorage.setItem('studio_active_page', pageId);
                    }
                    if(pageId && pageId !== 'zimage') {
                        document.querySelectorAll('.nav-item.active, .side-pill.active').forEach(function(n){
                            n.classList.remove('active');
                        });
                        var target = document.querySelector('[onclick*="\'' + pageId + '\'"]');
                        if(target) target.classList.add('active');
                    }
                } catch(e) {}
            })();
        </script>

        <main class="stage">
            <iframe id="frame-zimage" data-src="/static/zimage.html?v=2026.05.25.7" class="active" scrolling="yes"></iframe>
            <iframe id="frame-gpt-chat" data-src="/static/gpt-chat.html?v=2026.05.25.7" scrolling="yes"></iframe>
            <iframe id="frame-canvas" data-src="/static/canvas.html?v=2026.05.25.7" scrolling="yes"></iframe>
            <iframe id="frame-digital-human" data-src="/static/digital-human.html?v=2026.05.25.7" scrolling="yes"></iframe>
            <iframe id="frame-api-settings" data-src="/static/api-settings.html?v=2026.05.25.7" scrolling="yes"></iframe>
        </main>
    </div>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const SIDEBAR_EXPANDED_KEY = 'studio_sidebar_expanded';
        const DEFAULT_PAGE_ID = 'zimage';
        const PAGE_IDS = ['zimage','gpt-chat','canvas','digital-human','api-settings'];

        function setSidebarExpanded(expanded) {
            document.body.classList.toggle('sidebar-expanded', expanded);
            const btn = document.getElementById('sidebar-toggle-btn');
            if (btn) {
                btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                btn.title = expanded ? '收起侧边栏' : '展开侧边栏';
                btn.setAttribute('aria-label', expanded ? '收起侧边栏' : '展开侧边栏');
            }
            localStorage.setItem(SIDEBAR_EXPANDED_KEY, expanded ? '1' : '0');
        }

        function toggleSidebar() {
            setSidebarExpanded(!document.body.classList.contains('sidebar-expanded'));
        }

        function restoreSidebarState() {
            setSidebarExpanded(localStorage.getItem(SIDEBAR_EXPANDED_KEY) === '1');
        }

        function switchUI(el, id, options = {}) {
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
        }

        function restoreActivePage() {
            const id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : DEFAULT_PAGE_ID;
            const trigger = document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
            switchUI(trigger, id, { skipRemember:true });
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', () => {
            restoreSidebarState();
            restoreActivePage();
        }, { once:true });

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
        }

        function syncLanguageToFrame(frame) {
            if(!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
            } catch(e) {}
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
                } catch(e) {}
            });
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            if(window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncLanguageToFrame(f);
            });
        });

    </script>
